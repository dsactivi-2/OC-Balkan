<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVA Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --text:#e0e0ec;--muted:#7a7a9a;--accent:#3ecf8e;--accent2:#2ba86e;
  --danger:#f55;--warn:#f5a623;--blue:#5b8def;
  --border:#2a2a3e;--radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:13px}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Top Bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:48px;flex-shrink:0}
.topbar .logo{font-weight:800;font-size:16px;color:var(--accent)}
.topbar .logo span{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px}
.topbar .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.topbar .dot.off{background:var(--danger)}
.topbar .spacer{flex:1}
.topbar .badge{font-size:11px;padding:3px 8px;border-radius:12px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* ── Tab Nav ── */
.tabnav{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tabnav button{padding:10px 20px;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-size:13px;transition:all .15s}
.tabnav button:hover{color:var(--text);background:var(--bg3)}
.tabnav button.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Main Layout ── */
.main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;overflow:hidden}
.panel.active{display:flex}

/* ── Chat Panel ── */
.chat-layout{display:flex;flex:1;overflow:hidden}
.chat-sidebar{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg2)}
.chat-sidebar h3{padding:12px;font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:1px}
.chat-sessions{flex:1;overflow-y:auto}
.chat-session-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.chat-session-item:hover{background:var(--bg3)}
.chat-session-item.active{background:var(--bg4);border-left:3px solid var(--accent)}
.chat-session-item .name{font-size:13px;font-weight:600}
.chat-session-item .meta{font-size:11px;color:var(--muted);margin-top:2px}
.chat-new-btn{margin:8px;padding:10px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-weight:600;font-size:13px}
.chat-new-btn:hover{background:var(--accent2)}
.chat-center{flex:1;display:flex;flex-direction:column}
.chat-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.chat-header select{min-width:120px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--bg3);border-bottom-left-radius:4px}
.msg .agent-tag{font-size:11px;color:var(--accent);margin-bottom:4px;display:block}
.msg .actions{margin-top:6px;font-size:11px;color:var(--muted)}
.chat-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2)}
.chat-input input{flex:1}
.chat-input button{padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-weight:600}
.chat-input button:hover{background:var(--accent2)}
.chat-input button:disabled{opacity:.5;cursor:not-allowed}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;text-align:center;padding:40px}

/* ── Agents Panel ── */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px;overflow-y:auto;flex:1}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .15s}
.agent-card:hover{border-color:var(--accent)}
.agent-card .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.agent-card .card-head h3{font-size:16px;flex:1}
.agent-card .model-badge{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--bg4);color:var(--blue)}
.agent-card .tools-list{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.agent-card .tool-tag{font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(62,207,142,.1);color:var(--accent)}
.agent-card .soul-preview{font-size:12px;color:var(--muted);margin-top:8px;max-height:60px;overflow:hidden;line-height:1.4}
.agent-card .card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.agent-card .card-actions button{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px}
.agent-card .card-actions button:hover{border-color:var(--accent);color:var(--accent)}

/* ── Souls Panel ── */
.souls-layout{display:flex;flex:1;overflow:hidden}
.souls-list{width:240px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2)}
.soul-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.soul-item:hover{background:var(--bg3)}
.soul-item.active{background:var(--bg4);border-left:3px solid var(--accent)}
.soul-item .icon{font-size:18px}
.soul-item .info{flex:1}
.soul-item .name{font-size:13px;font-weight:600}
.soul-item .size{font-size:11px;color:var(--muted)}
.soul-editor{flex:1;display:flex;flex-direction:column}
.soul-editor-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.soul-editor-header h3{flex:1;font-size:15px}
.soul-editor-header button{padding:6px 16px;border-radius:6px;border:none;font-weight:600}
.save-btn{background:var(--accent);color:#000}
.save-btn:hover{background:var(--accent2)}
.soul-editor textarea{flex:1;border:none;border-radius:0;background:var(--bg);padding:16px;font-family:'JetBrains Mono',Monaco,'Courier New',monospace;font-size:13px;line-height:1.6;color:var(--text)}

/* ── Settings Panel ── */
.settings-layout{padding:20px;overflow-y:auto;flex:1;max-width:900px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:14px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.settings-grid{display:grid;grid-template-columns:200px 1fr;gap:8px 16px;align-items:center}
.settings-grid label{font-size:13px;color:var(--muted);text-align:right}
.settings-grid .val{font-size:13px;padding:6px 10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);font-family:'JetBrains Mono',Monaco,monospace;word-break:break-all}
.settings-grid .val.set{color:var(--accent)}
.settings-grid .val.unset{color:var(--danger);font-style:italic}

/* ── Logs Panel ── */
.logs-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.logs-toolbar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg2)}
.logs-content{flex:1;overflow-y:auto;padding:8px 16px;font-family:'JetBrains Mono',Monaco,monospace;font-size:12px;line-height:1.8}
.log-entry{display:flex;gap:10px;padding:2px 0;border-bottom:1px solid rgba(42,42,62,.3)}
.log-entry .ts{color:var(--muted);white-space:nowrap;min-width:80px}
.log-entry .lvl{min-width:50px;font-weight:600}
.log-entry .lvl.INFO{color:var(--accent)}.log-entry .lvl.WARN{color:var(--warn)}.log-entry .lvl.ERROR{color:var(--danger)}
.log-entry .src{color:var(--blue);min-width:60px}
.log-entry .msg-text{flex:1;word-break:break-all}

/* ── Files Panel ── */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s;margin:20px}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(62,207,142,.05)}
.file-list{padding:0 20px}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border)}
.file-item .fname{flex:1;font-size:13px}.file-item .fsize{color:var(--muted);font-size:12px}.file-item .fdate{color:var(--muted);font-size:11px}

/* ── Tools Panel ── */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:20px;overflow-y:auto;flex:1}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.tool-card h4{font-size:14px;color:var(--accent);margin-bottom:4px}
.tool-card .desc{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.tool-card .used-by{display:flex;flex-wrap:wrap;gap:4px}
.tool-card .used-by span{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--bg4);color:var(--blue)}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast.success{background:var(--accent2)}.toast.error{background:var(--danger)}.toast.info{background:var(--blue)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal-box h2{font-size:18px;margin-bottom:16px}
.modal-box label{display:block;margin-bottom:12px;font-size:13px;color:var(--muted)}
.modal-box label input,.modal-box label textarea,.modal-box label select{width:100%;margin-top:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-actions button{padding:8px 20px;border-radius:6px;border:none;font-weight:600}
.cancel-btn{background:var(--bg3);color:var(--text)}
.confirm-btn{background:var(--accent);color:#000}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">AVA <span>Command Center</span></div>
  <div class="status"><div class="dot" id="status-dot"></div><span id="status-text">Connecting...</span></div>
  <div class="badge" id="version-badge">v2.0.0</div>
  <div class="badge" id="memory-badge">Memory: ?</div>
  <div class="badge" id="tools-badge">Tools: ?</div>
  <div class="spacer"></div>
  <div class="badge" id="sessions-badge">Sessions: 0</div>
  <button style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px" onclick="refreshAll()">Refresh</button>
</div>

<!-- Tab Navigation -->
<div class="tabnav" id="tabnav">
  <button class="active" data-tab="chat">Chat</button>
  <button data-tab="agents">Agenten</button>
  <button data-tab="souls">Souls / MD</button>
  <button data-tab="tools">Tools</button>
  <button data-tab="logs">Logs</button>
  <button data-tab="settings">Settings</button>
  <button data-tab="files">Dateien</button>
</div>

<!-- Panels -->
<div class="main">

<!-- Chat -->
<div class="panel active" id="panel-chat">
  <div class="chat-layout">
    <div class="chat-sidebar">
      <h3>Chats</h3>
      <div class="chat-sessions" id="chat-sessions"></div>
      <button class="chat-new-btn" onclick="newChat()">+ Neuer Chat</button>
    </div>
    <div class="chat-center">
      <div class="chat-header">
        <select id="chat-channel"><option value="web">Web</option><option value="viber">Viber</option><option value="whatsapp">WhatsApp</option><option value="email">E-Mail</option></select>
        <select id="chat-agent"><option value="auto">Auto (Supervisor)</option></select>
        <div class="spacer"></div>
        <span style="font-size:12px;color:var(--muted)" id="chat-session-label">Kein Chat</span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="empty-chat">Starte einen neuen Chat oder waehle einen aus der Sidebar.</div>
      </div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Nachricht an AVA..." onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chat-send-btn" onclick="sendChat()">Senden</button>
      </div>
    </div>
  </div>
</div>

<!-- Agents -->
<div class="panel" id="panel-agents">
  <div class="agents-grid" id="agents-grid"></div>
</div>

<!-- Souls -->
<div class="panel" id="panel-souls">
  <div class="souls-layout">
    <div class="souls-list" id="souls-list"></div>
    <div class="soul-editor">
      <div class="soul-editor-header">
        <h3 id="soul-editor-title">Waehle eine Soul-Datei</h3>
        <button class="save-btn" onclick="saveSoul()" style="display:none" id="soul-save-btn">Speichern</button>
      </div>
      <textarea id="soul-textarea" placeholder="Soul-Datei auswaehlen..." disabled></textarea>
    </div>
  </div>
</div>

<!-- Tools -->
<div class="panel" id="panel-tools">
  <div class="tools-grid" id="tools-grid"></div>
</div>

<!-- Logs -->
<div class="panel" id="panel-logs">
  <div class="logs-layout">
    <div class="logs-toolbar">
      <select id="log-level" onchange="loadLogs()"><option value="">Alle Level</option><option value="INFO">INFO</option><option value="WARN">WARN</option><option value="ERROR">ERROR</option></select>
      <input type="number" id="log-limit" value="100" min="10" max="500" style="width:80px" onchange="loadLogs()">
      <button style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text)" onclick="loadLogs()">Aktualisieren</button>
      <div class="spacer"></div>
      <span style="font-size:12px;color:var(--muted)" id="log-count">0 Eintraege</span>
    </div>
    <div class="logs-content" id="logs-content"></div>
  </div>
</div>

<!-- Settings -->
<div class="panel" id="panel-settings">
  <div class="settings-layout" id="settings-content">Lade Konfiguration...</div>
</div>

<!-- Files -->
<div class="panel" id="panel-files">
  <div style="flex:1;overflow-y:auto">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" hidden multiple onchange="handleUpload(this.files)">
      <p style="font-size:15px;margin-bottom:8px">Dateien hierher ziehen oder klicken</p>
      <p style="font-size:12px;color:var(--muted)">Upload nach: <select id="upload-target" onclick="event.stopPropagation()"><option value="uploads">uploads/</option><option value="souls">souls/</option></select></p>
    </div>
    <div style="padding:0 20px;margin-bottom:12px;display:flex;gap:8px">
      <button onclick="loadFiles('souls')" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text)">Souls</button>
      <button onclick="loadFiles('tools')" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text)">Tools</button>
      <button onclick="loadFiles('uploads')" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text)">Uploads</button>
      <button onclick="loadFiles('static')" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text)">Static</button>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
</div>

</div>

<!-- Clone Modal -->
<div class="modal-overlay" id="clone-modal">
  <div class="modal-box">
    <h2>Agent klonen</h2>
    <label>Quell-Agent<select id="clone-source"></select></label>
    <label>Neuer Name<input type="text" id="clone-name" placeholder="z.B. customer_success"></label>
    <label>Model<select id="clone-model"><option value="">Gleich wie Quelle</option><option value="claude-sonnet-4-6">sonnet-4-6 (Smart)</option><option value="claude-haiku-4-5-20251001">haiku-4-5 (Fast)</option></select></label>
    <label>Soul anpassen (optional)<textarea id="clone-soul" rows="6" placeholder="Leer = kopiert Soul vom Quell-Agent"></textarea></label>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal('clone-modal')">Abbrechen</button>
      <button class="confirm-btn" onclick="doClone()">Klonen</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const BASE = location.pathname.replace(/\/dashboard\/?$/, '') || '';
const API = BASE;
let currentChat = null;
let chatSessions = {};
let agents = {};
let currentSoul = null;

async function api(path, opts = {}) {
  try {
    const res = await fetch(API + path, { headers: {'Content-Type':'application/json'}, ...opts });
    return await res.json();
  } catch (e) { return { ok: false, error: e.message }; }
}

function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function fmtBytes(b) { return b < 1024 ? b+' B' : (b/1024).toFixed(1)+' KB'; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ── Tab Nav ──
document.getElementById('tabnav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.tabnav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-' + e.target.dataset.tab).classList.add('active');
  const tab = e.target.dataset.tab;
  if (tab==='agents') loadAgents();
  if (tab==='souls') loadSouls();
  if (tab==='tools') loadTools();
  if (tab==='logs') loadLogs();
  if (tab==='settings') loadSettings();
  if (tab==='files') loadFiles('souls');
});

// ═══ HEALTH ═══
async function loadHealth() {
  const h = await api('/health');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (h.ok) { dot.className='dot'; txt.textContent='Online'; document.getElementById('version-badge').textContent='v'+h.version; }
  else { dot.className='dot off'; txt.textContent='Offline'; }
  const a = await api('/api/agents');
  if (a.ok) {
    document.getElementById('tools-badge').textContent='Tools: '+a.total_tools;
    document.getElementById('memory-badge').textContent='Memory: '+(a.persistent_memory?'PostgreSQL':'In-Memory');
    agents = a.agents;
    const sel = document.getElementById('chat-agent');
    sel.innerHTML = '<option value="auto">Auto (Supervisor)</option>';
    for (const [name, info] of Object.entries(agents))
      sel.innerHTML += `<option value="${name}">${info.soul} (${name})</option>`;
  }
  const st = await api('/api/admin/status');
  if (st.ok) document.getElementById('sessions-badge').textContent='Sessions: '+st.chat_sessions;
}
async function refreshAll() { await loadHealth(); toast('Aktualisiert','success'); }

// ═══ CHAT ═══
function newChat() {
  const id = 'chat-' + Date.now().toString(36);
  chatSessions[id] = []; currentChat = id;
  renderChatList(); renderMessages();
  document.getElementById('chat-input').focus();
}
function openChat(id) { currentChat = id; renderChatList(); renderMessages(); }

function renderChatList() {
  const c = document.getElementById('chat-sessions'); c.innerHTML = '';
  for (const [id, msgs] of Object.entries(chatSessions)) {
    const last = msgs[msgs.length-1];
    const preview = last ? last.text.substring(0,40) : 'Neuer Chat';
    c.innerHTML += `<div class="chat-session-item ${id===currentChat?'active':''}" onclick="openChat('${id}')">
      <div class="name">${id.replace('chat-','Chat ')}</div>
      <div class="meta">${msgs.length} Nachrichten</div></div>`;
  }
  document.getElementById('chat-session-label').textContent = currentChat||'Kein Chat';
}

function renderMessages() {
  const c = document.getElementById('chat-messages');
  if (!currentChat || !chatSessions[currentChat]) {
    c.innerHTML = '<div class="empty-chat">Starte einen neuen Chat oder waehle einen aus der Sidebar.</div>'; return;
  }
  const msgs = chatSessions[currentChat];
  if (!msgs.length) { c.innerHTML='<div class="empty-chat">Schreibe eine Nachricht — der Supervisor routet automatisch.</div>'; return; }
  c.innerHTML = msgs.map(m => {
    if (m.role==='user') return `<div class="msg user">${esc(m.text)}</div>`;
    let html = `<div class="msg assistant">`;
    if (m.agent) html += `<span class="agent-tag">${esc(m.agent)}</span>`;
    html += esc(m.text);
    if (m.actions && m.actions.length) html += `<div class="actions">${m.actions.map(a=>'→ '+esc(a)).join('<br>')}</div>`;
    return html + '</div>';
  }).join('');
  c.scrollTop = c.scrollHeight;
}

async function sendChat() {
  if (!currentChat) newChat();
  const input = document.getElementById('chat-input');
  const text = input.value.trim(); if (!text) return;
  const agent = document.getElementById('chat-agent').value;
  const channel = document.getElementById('chat-channel').value;
  chatSessions[currentChat].push({role:'user',text,ts:new Date().toISOString()});
  renderMessages(); input.value='';
  document.getElementById('chat-send-btn').disabled = true;
  const res = await api('/api/admin/chat',{method:'POST',body:JSON.stringify({text,session_id:currentChat,agent,channel})});
  document.getElementById('chat-send-btn').disabled = false;
  if (res.ok) chatSessions[currentChat].push({role:'assistant',text:res.response,agent:res.agent,actions:res.actions,ts:new Date().toISOString()});
  else chatSessions[currentChat].push({role:'assistant',text:'Fehler: '+(res.error||'Keine Antwort'),agent:'system',ts:new Date().toISOString()});
  renderMessages(); renderChatList(); input.focus();
}

// ═══ AGENTS ═══
async function loadAgents() {
  const res = await api('/api/admin/agents/config');
  if (!res.ok) return;
  const grid = document.getElementById('agents-grid'); grid.innerHTML='';
  const icons = {sales_agent:'💰',onboarding_agent:'🚀',support_agent:'🛟',billing_agent:'💳',marketing_agent:'📣',ops_agent:'⚙️'};
  for (const [name, info] of Object.entries(res.agents)) {
    grid.innerHTML += `<div class="agent-card">
      <div class="card-head"><span style="font-size:24px">${icons[name]||'🤖'}</span><h3>${esc(info.soul_name)}</h3><span class="model-badge">${esc(info.model)}</span></div>
      <div style="font-size:12px;color:var(--muted)">Soul: ${info.soul_file||'none'} · ${info.tool_count} Tools</div>
      <div class="tools-list">${info.tools.map(t=>`<span class="tool-tag">${esc(t)}</span>`).join('')}</div>
      <div class="soul-preview" id="sp-${name}">Lade Soul...</div>
      <div class="card-actions">
        <button onclick="openSoulFromAgent('${name.replace('_agent','')}')">Soul bearbeiten</button>
        <button onclick="chatWithAgent('${name}')">Chat starten</button>
        <button onclick="openCloneModal('${name}')">Klonen</button>
      </div></div>`;
  }
  for (const [name] of Object.entries(res.agents)) {
    const sn = name.replace('_agent','');
    api('/api/admin/souls/'+sn).then(sr => {
      const el = document.getElementById('sp-'+name);
      if (el && sr.ok) el.textContent = sr.content.substring(0,200)+'...';
      else if (el) el.textContent = '(keine Soul-Datei)';
    });
  }
}
function chatWithAgent(n) { newChat(); document.getElementById('chat-agent').value=n; document.querySelector('.tabnav button[data-tab="chat"]').click(); }
function openSoulFromAgent(n) { document.querySelector('.tabnav button[data-tab="souls"]').click(); setTimeout(()=>selectSoul(n),300); }

function openCloneModal(agentName) {
  const src = document.getElementById('clone-source'); src.innerHTML='';
  for (const name of Object.keys(agents)) src.innerHTML += `<option value="${name}" ${name===agentName?'selected':''}>${name}</option>`;
  document.getElementById('clone-name').value=''; document.getElementById('clone-soul').value='';
  document.getElementById('clone-modal').classList.add('show');
}
async function doClone() {
  const source=document.getElementById('clone-source').value;
  const newName=document.getElementById('clone-name').value.trim();
  const model=document.getElementById('clone-model').value;
  const soul=document.getElementById('clone-soul').value.trim();
  if (!newName) { toast('Name erforderlich','error'); return; }
  const res = await api('/api/admin/agents/clone',{method:'POST',body:JSON.stringify({source_agent:source,new_name:newName,new_soul_content:soul||null,model:model||null})});
  if (res.ok) { toast(`Agent geklont: ${source} → ${newName}`,'success'); closeModal('clone-modal'); loadAgents(); }
  else toast('Fehler: '+(res.error||res.detail),'error');
}

// ═══ SOULS / MD ═══
async function loadSouls() {
  const res = await api('/api/admin/souls'); if (!res.ok) return;
  const list = document.getElementById('souls-list');
  const icons = {sales:'💰',onboarding:'🚀',support:'🛟',billing:'💳',marketing:'📣',ops:'⚙️',supervisor:'🧠'};
  list.innerHTML='';
  for (const [name, info] of Object.entries(res.souls))
    list.innerHTML += `<div class="soul-item ${name===currentSoul?'active':''}" onclick="selectSoul('${name}')">
      <span class="icon">${icons[name]||'📄'}</span><div class="info"><div class="name">${name}.md</div><div class="size">${fmtBytes(info.size)}</div></div></div>`;
}
async function selectSoul(name) {
  currentSoul = name;
  const res = await api('/api/admin/souls/'+name); if (!res.ok) { toast('Fehler beim Laden','error'); return; }
  document.getElementById('soul-editor-title').textContent = name+'.md';
  const ta = document.getElementById('soul-textarea'); ta.value=res.content; ta.disabled=false;
  document.getElementById('soul-save-btn').style.display='';
  document.querySelectorAll('.soul-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.name')?.textContent === name+'.md');
  });
}
async function saveSoul() {
  if (!currentSoul) return;
  const content = document.getElementById('soul-textarea').value;
  const res = await api('/api/admin/souls/'+currentSoul,{method:'PUT',body:JSON.stringify({content})});
  if (res.ok) toast(`${currentSoul}.md gespeichert (${res.size} Zeichen)`,'success');
  else toast('Fehler: '+(res.error||res.detail),'error');
}

// ═══ TOOLS ═══
async function loadTools() {
  const res = await api('/api/admin/tools'); if (!res.ok) return;
  const grid = document.getElementById('tools-grid'); grid.innerHTML='';
  for (const [name, info] of Object.entries(res.tools))
    grid.innerHTML += `<div class="tool-card"><h4>${esc(name)}</h4>
      <div class="desc">${esc(info.description).substring(0,120)}</div>
      <div class="used-by">${info.used_by.map(a=>`<span>${esc(a)}</span>`).join('')}</div></div>`;
}

// ═══ LOGS ═══
async function loadLogs() {
  const level=document.getElementById('log-level').value;
  const limit=document.getElementById('log-limit').value;
  const res = await api(`/api/admin/logs?limit=${limit}&level=${level}`); if (!res.ok) return;
  document.getElementById('log-count').textContent=res.count+' Eintraege';
  const c = document.getElementById('logs-content');
  if (!res.logs.length) { c.innerHTML='<div style="padding:20px;color:var(--muted)">Keine Logs. Sende eine Nachricht im Chat.</div>'; return; }
  c.innerHTML = res.logs.map(l=>`<div class="log-entry">
    <span class="ts">${(l.ts.split('T')[1]||l.ts).substring(0,8)}</span>
    <span class="lvl ${l.level}">${l.level}</span>
    <span class="src">${esc(l.source)}</span>
    <span class="msg-text">${esc(l.message)}</span></div>`).join('');
  c.scrollTop = c.scrollHeight;
}

// ═══ SETTINGS ═══
async function loadSettings() {
  const res = await api('/api/admin/config'); if (!res.ok) return;
  const c = document.getElementById('settings-content'); let html='';
  for (const [section, vals] of Object.entries(res.config)) {
    html += `<div class="settings-section"><h3>${esc(section)}</h3><div class="settings-grid">`;
    for (const [key, val] of Object.entries(vals)) {
      const s=String(val); const isSet = s && s!=='***' && s!=='';
      html += `<label>${esc(key)}</label><div class="val ${isSet?'set':'unset'}">${isSet?esc(s):'(nicht gesetzt)'}</div>`;
    }
    html += '</div></div>';
  }
  c.innerHTML = html;
}

// ═══ FILES ═══
async function loadFiles(dir) {
  const res = await api('/api/admin/files/'+dir); if (!res.ok) return;
  const c = document.getElementById('file-list');
  if (!res.files.length) { c.innerHTML=`<div style="padding:20px;color:var(--muted)">Keine Dateien in ${dir}/</div>`; return; }
  c.innerHTML = `<div style="margin-bottom:8px;font-size:12px;color:var(--muted);text-transform:uppercase">${dir}/ — ${res.files.length} Dateien</div>` +
    res.files.map(f=>`<div class="file-item"><span class="fname">${esc(f.name)}</span><span class="fsize">${fmtBytes(f.size)}</span><span class="fdate">${f.modified.split('T')[0]}</span></div>`).join('');
}
async function handleUpload(files) {
  const target = document.getElementById('upload-target').value;
  for (const file of files) {
    const fd = new FormData(); fd.append('file', file);
    const res = await fetch(API+'/api/admin/upload?target='+target,{method:'POST',body:fd});
    const data = await res.json();
    if (data.ok) toast(`${file.name} hochgeladen nach ${target}/`,'success');
    else toast(`Upload fehlgeschlagen: ${data.error||data.detail}`,'error');
  }
  loadFiles(target);
}
const ua=document.getElementById('upload-area');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('dragover')});
ua.addEventListener('dragleave',()=>ua.classList.remove('dragover'));
ua.addEventListener('drop',e=>{e.preventDefault();ua.classList.remove('dragover');handleUpload(e.dataTransfer.files)});

// ═══ INIT ═══
loadHealth();
setInterval(loadHealth, 30000);
</script>
