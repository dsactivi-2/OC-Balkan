# ============================================
# OpenClaw Balkan — Nginx Site Configuration
# ============================================

# ─── HTTP → HTTPS Redirect ───
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ───
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name _DOMAIN_PLACEHOLDER_;

    # ─── SSL ───
    ssl_certificate /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:;" always;

    # ─── OpenClaw AI Platform (/app/) ───
    # ^~ ensures this prefix takes priority over regex locations for static assets
    location ^~ /app/ {
        proxy_pass http://openclaw_platform_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /app;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        client_max_body_size 50m;
    }

    # ─── AVA Agent Runtime API (/ava/) ───
    location ^~ /ava/ {
        proxy_pass http://ava_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        client_max_body_size 5m;
    }

    # ─── Viber Webhook → AVA ───
    location = /webhook/viber {
        proxy_pass http://ava_backend/api/webhook/viber;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # ─── Website (landing page) ───
    location / {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        limit_req zone=api burst=50 nodelay;
        limit_conn addr 50;
    }

    # ─── Auth rate limit ───
    location /api/auth/ {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=login burst=3 nodelay;
    }

    # ─── Webhooks ───
    location ~ ^/api/webhooks/(stripe|viber|whatsapp) {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        client_max_body_size 5m;
    }

    # ─── Static assets (website only, /app/ handled by ^~ above) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://openclaw_backend;
        proxy_cache static;
        proxy_cache_lock on;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Block sensitive paths ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ ^/(\.env|docker-compose|Makefile) {
        deny all;
    }
}
