# ============================================
# OpenClaw Balkan — Nginx Site Configuration
# ============================================

# ─── HTTP → HTTPS Redirect ───
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (for Docker healthcheck on port 80)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # IMPORTANT: Replace with your actual domain after SSL setup
    # During initial setup, this block is inactive until certs exist
    server_name _DOMAIN_PLACEHOLDER_;

    # ─── SSL ───
    ssl_certificate /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/_DOMAIN_PLACEHOLDER_/chain.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:;" always;

    # ─── Proxy to OpenClaw ───
    location / {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Rate limiting for API
        limit_req zone=api burst=50 nodelay;
        limit_conn addr 50;
    }

    # ─── API Rate Limiting (stricter) ───
    location /api/auth/ {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=login burst=3 nodelay;
    }

    # ─── Webhook endpoints (Stripe, Viber, WhatsApp) ───
    location ~ ^/api/webhooks/(stripe|viber|whatsapp) {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhooks need raw body
        proxy_set_header Content-Type $content_type;
        client_max_body_size 5m;

        # No rate limiting for webhooks
    }

    # ─── Static assets ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://openclaw_backend;
        proxy_cache static;
        proxy_cache_lock on;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Block sensitive paths ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|docker-compose|Makefile) {
        deny all;
    }
}
