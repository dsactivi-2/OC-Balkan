##############################################
# OpenClaw Balkan — Production Docker Compose
# Hetzner CX31 (4 vCPU, 8 GB RAM)
##############################################

services:

  # ─── Nginx Reverse Proxy + SSL ───
  nginx:
    image: nginx:1.27-alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      openclaw:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ─── Certbot (SSL Certificates) ───
  certbot:
    image: certbot/certbot:v2.7.3
    container_name: openclaw-certbot
    restart: unless-stopped
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── OpenClaw Website (Landing Page) ───
  openclaw:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: openclaw-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${OPENCLAW_SECRET_KEY}
      - NODE_ENV=production
      - PORT=${OPENCLAW_PORT:-4173}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ORDER_WEBHOOK_URL=${ORDER_WEBHOOK_URL:-}
      - LEAD_WEBHOOK_URL=${LEAD_WEBHOOK_URL:-}
      - PROVISION_SCRIPT=/app/infra/scripts/provision-bundle.sh
      - OPENCLAW_CONTAINER=openclaw-platform
      - ALLOWED_ORIGINS=https://${DOMAIN}
      - ONBOARDING_WEBHOOK_URL=${ONBOARDING_WEBHOOK_URL:-}
      - AVA_BASE_URL=http://ava:8000
    volumes:
      - openclaw-data:/app/data
      - openclaw-uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../bundles:/opt/openclaw/bundles:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:4173/health\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ─── OpenClaw AI Platform (Official Image) ───
  openclaw-platform:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-platform
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/openclaw_platform
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - SECRET_KEY=${OPENCLAW_SECRET_KEY}
      - NODE_ENV=production
      - PORT=18789
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - platform-data:/app/data
      - platform-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:18789/ || curl -sf http://localhost:18789/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Performance tuning for CX31 (8 GB RAM)
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c maintenance_work_mem=512MB
        -c work_mem=16MB
        -c max_connections=100
        -c random_page_cost=1.1
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c max_wal_size=2GB
        -c min_wal_size=1GB
        -c default_statistics_target=100
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3.5G
        reservations:
          cpus: '1.5'
          memory: 2.5G

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── AVA Agent Runtime (Zero-Human Company Brain) ───
  ava:
    build:
      context: ..
      dockerfile: agents_runtime/Dockerfile
    container_name: openclaw-ava
    restart: unless-stopped
    env_file: .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://37.27.71.134:14000}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - MODEL_SMART=${MODEL_SMART:-claude-sonnet-4-6}
      - MODEL_FAST=${MODEL_FAST:-claude-haiku-4-5-20251001}
      - VIBER_AUTH_TOKEN=${VIBER_AUTH_TOKEN:-}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL:-}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-hallo@openclawbalkan.ba}
      - HETZNER_API_TOKEN=${HETZNER_API_TOKEN:-}
      - HETZNER_DNS_TOKEN=${HETZNER_DNS_TOKEN:-}
      - WEBSITE_BASE_URL=https://${DOMAIN}
      - OPENCLAW_PLATFORM_URL=http://openclaw-platform:18789
      - SERVER_IP=${SERVER_IP:-116.203.236.137}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - FACEBOOK_PAGE_TOKEN=${FACEBOOK_PAGE_TOKEN:-}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN:-}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN:-}
      - ADMIN_VIBER_ID=${ADMIN_VIBER_ID:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-ds.selmanovic@gmail.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      openclaw:
        condition: service_healthy
      openclaw-platform:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Watchtower (Auto-Update Containers) ───
  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: openclaw-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=false
      # Only update specific containers
      - WATCHTOWER_SCOPE=openclaw
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.centurylinklabs.watchtower.scope=openclaw"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  openclaw-data:
    driver: local
  openclaw-uploads:
    driver: local
  platform-data:
    driver: local
  platform-uploads:
    driver: local
  certbot-webroot:
    driver: local
  certbot-certs:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No external access — only containers
