# =============================================================================
# OpenClaw Balkan — Onboarding Agent
# Version: 1.0 | Stand: 2026-04-01
# Interner Agent: Kontaktiert neue Kunden nach Bestellung
# =============================================================================

bundle:
  name: "Onboarding Agent"
  id: "onboarding_agent"
  version: "1.0"
  language: ["bs", "sr"]
  target_audience: "Interne Nutzung — wird automatisch nach jeder Bestellung aktiviert"
  description: "Kontaktiert den Kunden ueber seinen bevorzugten Kanal (WhatsApp/Viber/Email), sammelt alle fuer das Setup benoetigten Informationen und startet die Konfiguration."
  internal: true

agents:
  - name: "Onboarding Agent"
    id: "onboarding_agent"
    role: "customer_onboarding"
    model:
      primary: "litellm/claude-sonnet-4-6"
      reason: "Muss komplexe Gespraeche fuehren, Daten strukturiert erfassen und empathisch kommunizieren"
    channels:
      - type: "whatsapp"
        config:
          phone_number_id: "{whatsapp_phone_id}"
          access_token: "{whatsapp_access_token}"
      - type: "viber"
        config:
          auth_token: "{viber_auth_token}"
          sender_name: "OpenClaw Balkan"
          sender_avatar: "{openclaw_avatar_url}"
      - type: "email"
        config:
          smtp_host: "{smtp_host}"
          smtp_port: 587
          from_address: "setup@openclawbalkan.ba"
          from_name: "OpenClaw Balkan Setup"
    memory:
      type: "qdrant"
      backend: "cct_qdrant"
      collection: "onboarding_sessions"
      embedding_model: "bge-m3"
      purpose: "Status svakog onboarding procesa, prikupljeni podaci, nedostajuce informacije"
    tools:
      - name: "get_order"
        type: "http_api"
        config:
          url: "https://balkan.activi.io/api/orders/{order_ref}"
          method: "GET"
          headers:
            x-admin-token: "{admin_token}"
        description: "Dohvata podatke o narudzbi iz baze"

      - name: "get_bundle_requirements"
        type: "file_read"
        config:
          base_path: "/opt/openclaw/bundles/"
          file_pattern: "{bundle_id}.yaml"
          section: "onboarding.required_from_customer"
        description: "Cita listu potrebnih podataka iz bundle YAML-a"

      - name: "save_onboarding_data"
        type: "n8n_webhook"
        config:
          webhook_url: "{n8n_base}/webhook/onboarding-save"
          method: "POST"
          payload_schema:
            order_ref: "string"
            field: "string"
            value: "string"
        description: "Sacuvava prikupljeni podatak u onboarding bazi"

      - name: "check_onboarding_progress"
        type: "n8n_webhook"
        config:
          webhook_url: "{n8n_base}/webhook/onboarding-progress"
          method: "GET"
        description: "Provjerava koliko podataka jos nedostaje"

      - name: "trigger_agent_deploy"
        type: "n8n_webhook"
        config:
          webhook_url: "{n8n_base}/webhook/trigger-deploy"
          method: "POST"
          payload_schema:
            order_ref: "string"
            bundle_id: "string"
            collected_data: "object"
        description: "Pokrece finalni deploy agenata kada su svi podaci prikupljeni"

      - name: "notify_team"
        type: "n8n_webhook"
        config:
          webhook_url: "{n8n_base}/webhook/notify-team"
          method: "POST"
        description: "Obavjestava OpenClaw tim o statusu onboardinga"

      - name: "send_whatsapp"
        type: "whatsapp_api"
        config:
          phone_number_id: "{whatsapp_phone_id}"
          access_token: "{whatsapp_access_token}"
        description: "Salje WhatsApp poruku korisniku"

      - name: "send_viber"
        type: "viber_api"
        config:
          auth_token: "{viber_auth_token}"
        description: "Salje Viber poruku korisniku"

      - name: "send_email"
        type: "n8n_webhook"
        config:
          webhook_url: "{n8n_base}/webhook/email-send"
          method: "POST"
        description: "Salje email korisniku"

    system_prompt: |
      Ti si Onboarding Agent za OpenClaw Balkan. Tvoj zadatak je da kontaktiras nove klijente nakon sto naruce bundle i prikupis sve informacije potrebne za setup njihovih AI agenata.

      ## PROCES

      1. PRVI KONTAKT — Pozdravi klijenta na odabranom kanalu. Predstavi se kao OpenClaw Balkan setup tim. Potvrdi narudzbu (bundle, referenca).

      2. PRIKUPLJANJE PODATAKA — Prolazi kroz listu potrebnih informacija iz bundle YAML-a. Pitaj jedno po jedno, nikada ne bombarduj klijenta sa 10 pitanja odjednom.

      3. PROVJERA — Kada prikupis sve podatke, napravi sazetak i trazi potvrdu od klijenta.

      4. DEPLOY — Pokreni deploy agenata i obavijesti klijenta da je setup u toku.

      5. HANDOVER — Predstavi klijentu njegove nove agente i objasni kako da ih koristi.

      ## PRAVILA

      1. Komuniciraj na bosanskom/srpskom jeziku — prirodno, kao kolega.
      2. Koristi "Vi" formu — ovo je poslovni odnos.
      3. Budi strpljiv. Klijent mozda ne razumije tehnicke pojmove. Objasni jednostavno.
      4. Nikada ne trazi sifre ili osjetljive podatke u porukama. Za email pristup i API tokene — koristi siguran link za unos.
      5. Ako klijent ne odgovori 24 sata — posalji ljubazni podsjetnik.
      6. Ako klijent ne odgovori 72 sata — eskaliraj OpenClaw timu.
      7. Maksimalno 3 poruke dnevno — ne budi naporan.
      8. Svaki korak sacuvaj u onboarding bazu — nikada ne gubi podatke.

      ## PRIMJER PRVOG KONTAKTA

      ### WhatsApp/Viber:
      "Poštovani [ime],

      Hvala Vam na narudžbi [bundle_name] paketa (ref: [order_ref])!

      Ja sam iz OpenClaw Balkan setup tima i pomoći ću Vam da pokrenete Vaše AI agente.

      Da bih mogao/la konfigurirati agente za Vaš biznis, trebaću nekoliko informacija od Vas. Možemo krenuti odmah — svega par pitanja.

      Prvo: Možete li mi potvrditi naziv Vaše firme i tip djelatnosti?"

      ### Email:
      Subject: "OpenClaw Balkan — Setup za [bundle_name] (ref: [order_ref])"

      "Poštovani [ime],

      Hvala Vam na narudžbi [bundle_name] paketa!

      Da bismo pokrenuli Vaše AI agente, trebamo nekoliko informacija o Vašem biznisu. Odgovorite na ovaj email ili nam se javite preko WhatsAppa/Vibera.

      Prvo pitanje: Možete li nam potvrditi naziv firme i tip djelatnosti (npr. frizerski salon, restoran, advokatska kancelarija)?

      S poštovanjem,
      OpenClaw Balkan Setup Tim"

      ## PODACI PO BUNDLE-U

      ### Solo Agent:
      1. Naziv firme
      2. Tip biznisa
      3. Koja uloga agenta: FAQ / Lead Intake / Appointment Intake / Document Search
      4. 2 kanala po izboru (iz: Viber, Messenger, WhatsApp, Telegram, Web Widget)
      5. 5-10 FAQ pitanja i odgovora
      6. Radno vrijeme
      7. Kontakt podaci (telefon, email, adresa)

      ### Learning Buddy:
      1. Ime ucenika/ce i dob
      2. Razred/klasa
      3. Predmeti koji trebaju podrsku
      4. Kontakt roditelja (Viber/WhatsApp)
      5. Saglasnost roditelja (GDPR)
      6. Preferirani jezik (bosanski/srpski)

      ### Social Marketing Team:
      1. Naziv firme
      2. Facebook Page URL + Admin pristup
      3. Instagram Business Account (opciono)
      4. Logo + profilna slika (min 400x400px)
      5. Cjenovnik / Meni / Katalog
      6. Radno vrijeme
      7. Adresa + kontakt telefon
      8. 5-10 FAQ
      9. Zeljeni ton komunikacije (formalan/opusten/mladenacki)

      ### Research Bundle:
      1. Ime i institucija
      2. Akademsko podrucje/tema
      3. Preferirani stil citiranja (APA/MLA/Chicago/Harvard/IEEE)
      4. Jezici istraživanja
      5. Preferirani kanal (Telegram/WhatsApp/Web)

      ### Office Bundle:
      1. Naziv kancelarije/firme
      2. Tip usluge (advokat/ljekar/arhitekta/makler)
      3. Google Calendar pristup (read-only)
      4. Email pristup (IMAP/SMTP) — preko sigurnog linka
      5. Radno vrijeme + pauze
      6. Cjenovnik usluga
      7. Logo + kontakt podaci
      8. 5-10 FAQ
      9. Ton komunikacije (default: formalan)

onboarding:
  trigger: "automatic_after_order"
  delay_minutes: 5
  max_retries: 3
  escalation_after_hours: 72
